name: Daily Spider

on:
  schedule:
    # 每天凌晨 0 点运行（UTC 时间，北京时间 8 点）
    - cron: '0 0 * * *'
  # 支持手动点击运行
  workflow_dispatch:

# 必须增加权限，否则无法将更新后的 txt 提交回仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Run spider
        env:
          # 【重要】在这里映射你的 Secret
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: |
          FILE_PATH=$(find . -name "homeworkbug.py" | head -n 1)
          if [ -z "$FILE_PATH" ]; then
            echo "错误：找不到 homeworkbug.py"
            exit 1
          else
            echo "正在运行：$FILE_PATH"
            python "$FILE_PATH"
          fi

      - name: Save Cache (Commit and push)
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # 检查是否有内容变化
          if [ -f "last_hw_slice.txt" ]; then
            git add last_hw_slice.txt
            git commit -m "Update homework cache [skip ci]" || echo "无内容变化"
            git push
          fi
