name: Daily Spider

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 解决了 Node.js 20 的警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 解决了 Node.js 20 的警告
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 自动安装爬虫需要的库，如果你有别的库，请在后面加上空格继续写
          pip install requests beautifulsoup4 pandas 

      - name: Check Directory
        run: ls -R  # 这行会在日志里列出所有文件，方便我们debug

      - name: Run spider
        # 用这个命令，它会自动在所有文件夹里找 homeworkbug.py 并运行
        run: |
          FILE_PATH=$(find . -name "homeworkbug.py" | head -n 1)
          if [ -z "$FILE_PATH" ]; then
            echo "错误：在仓库里根本没找到 homeworkbug.py"
            ls -R
            exit 1
          else
            echo "找到文件：$FILE_PATH"
            python "$FILE_PATH"
          fi
